<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9B%A0%EF%B8%8F%3C/text%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Helpdesk IT Logbook</title>

    <style>
      /* =========================================================
         PRELOADER — Neo-Brutalism
         Ditaruh inline di <head> supaya bisa langsung render
         sebelum CSS/JS aplikasi (index.css, main.jsx) selesai dimuat.
         ========================================================= */
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;800&display=swap");

      #app-preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f4f4f0;
        font-family: "Space Grotesk", "Inter", "Segoe UI", Arial, sans-serif;
        transition:
          opacity 0.35s cubic-bezier(0.16, 1, 0.3, 1),
          visibility 0.35s;
      }

      #app-preloader.preloader-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .preloader-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
      }

      /* Logo mark "IT" — bergaya sama dengan .brand-mark di app,
         tapi dibuat lebih besar dan berdenyut (pulse) sebagai indikator loading */
      .preloader-mark {
        width: 64px;
        height: 64px;
        background: #3b82f6;
        color: #fff;
        border: 3px solid #000;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 22px;
        box-shadow: 5px 5px 0 #000;
        animation: preloader-pulse 1.1s cubic-bezier(0.68, -0.4, 0.32, 1.4)
          infinite;
      }

      @keyframes preloader-pulse {
        0%,
        100% {
          transform: translate(0, 0);
          box-shadow: 5px 5px 0 #000;
        }
        50% {
          transform: translate(-3px, -3px);
          box-shadow: 8px 8px 0 #000;
        }
      }

      .preloader-text {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #000;
      }

      /* Bar loading bergaya "hard shadow" dengan animasi isi bergerak */
      .preloader-bar-track {
        width: 160px;
        height: 12px;
        background: #ffffff;
        border: 2px solid #000;
        border-radius: 6px;
        box-shadow: 3px 3px 0 #000;
        overflow: hidden;
      }

      .preloader-bar-fill {
        height: 100%;
        width: 40%;
        background: #3b82f6;
        border-radius: 3px;
        animation: preloader-bar-slide 1.15s ease-in-out infinite;
      }

      @keyframes preloader-bar-slide {
        0% {
          transform: translateX(-100%);
        }
        50% {
          transform: translateX(80%);
        }
        100% {
          transform: translateX(250%);
        }
      }

      .preloader-sub {
        font-size: 11px;
        color: #63625c;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <!-- Preloader tampil duluan; dihapus otomatis lewat script di bawah
         begitu React selesai mount ke #root -->
    <div id="app-preloader">
      <div class="preloader-inner">
        <div class="preloader-mark">IT</div>
        <div class="preloader-bar-track">
          <div class="preloader-bar-fill"></div>
        </div>
        <div class="preloader-text">Memuat Logbook Helpdesk</div>
        <div class="preloader-sub">Mohon tunggu sebentar...</div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Sembunyikan preloader begitu React sudah merender sesuatu ke #root.
      // Pakai MutationObserver supaya tidak bergantung pada window.onload
      // (yang bisa lebih lambat karena menunggu semua aset, bukan cuma app siap).
      (function () {
        var root = document.getElementById("root");
        var preloader = document.getElementById("app-preloader");
        if (!root || !preloader) return;

        var removePreloader = function () {
          preloader.classList.add("preloader-hidden");
          // Hapus dari DOM setelah transisi selesai supaya tidak menghalangi klik
          setTimeout(function () {
            if (preloader.parentNode) {
              preloader.parentNode.removeChild(preloader);
            }
          }, 400);
        };

        var observer = new MutationObserver(function () {
          if (root.childElementCount > 0) {
            removePreloader();
            observer.disconnect();
          }
        });

        observer.observe(root, { childList: true });

        // Fallback: kalau karena suatu sebab observer tidak pernah terpicu
        // (mis. error di app), tetap sembunyikan preloader setelah 8 detik
        // supaya user tidak terjebak di layar loading selamanya.
        setTimeout(function () {
          if (document.body.contains(preloader)) {
            removePreloader();
            observer.disconnect();
          }
        }, 8000);
      })();
    </script>
  </body>
</html>
